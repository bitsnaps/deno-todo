<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Todo — Deno + Vue</title>
        <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <div id="app">
            <h1>📋 <span>Todo</span> App</h1>

            <div class="input-bar">
                <input
                    v-model="newTitle"
                    @keyup.enter="addTodo"
                    placeholder="What needs to be done?"
                    autofocus
                />
                <button @click="addTodo" :disabled="!newTitle.trim()">
                    Add
                </button>
            </div>

            <div class="stats" v-if="todos.length">
                <span>{{ remaining }} remaining</span>
                <span>·</span>
                <span>{{ completed }} completed</span>
            </div>

            <div class="filters" v-if="todos.length">
                <button
                    :class="{ active: filter === 'all' }"
                    @click="filter = 'all'"
                >
                    All
                </button>
                <button
                    :class="{ active: filter === 'active' }"
                    @click="filter = 'active'"
                >
                    Active
                </button>
                <button
                    :class="{ active: filter === 'done' }"
                    @click="filter = 'done'"
                >
                    Done
                </button>
            </div>

            <ul class="todo-list" v-if="filtered.length">
                <li
                    v-for="todo in filtered"
                    :key="todo.id"
                    class="todo-item"
                    :class="{ done: todo.completed }"
                >
                    <div
                        class="check"
                        :class="{ checked: todo.completed }"
                        @click="toggle(todo)"
                    ></div>
                    <span class="title">{{ todo.title }}</span>
                    <button
                        class="delete-btn"
                        @click="remove(todo.id)"
                        title="Delete"
                    >
                        ×
                    </button>
                </li>
            </ul>
            <p v-else class="empty">
                {{ todos.length === 0 ? 'No todos yet — add one above!' : 'No '
                + filter + ' todos' }}
            </p>
        </div>

        <script type="module" src="app.js"></script>
    </body>
</html>
